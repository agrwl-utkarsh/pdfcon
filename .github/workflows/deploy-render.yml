name: Deploy Backend (Render)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "pdfpilot/backend/**"
      - "render.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
